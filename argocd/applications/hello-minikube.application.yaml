apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-minikube
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mathieu-bourguignon/bootstrap-minikube.git
    targetRevision: argocd
    path: apps/hello-minikube
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
