image:
  repository: ghcr.io/amelgannoun/bootstrap-minikube/python-api
  tag: latest
  pullPolicy: Always

service:
  name: test-api-service
  port: 80
  targetPort: 5000

versions:
  - name: v1
    weight: 90
    replicas: 1
    message: stable
  - name: v2
    weight: 10
    replicas: 1
    message: canary

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  averageUtilization: 50

probes:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10

istio:
  gateway:
    name: platform-gateway
    host: "*"
  route:
    prefix: /test
    rewrite: /

metrics:
  enabled: true
  path: /metrics

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  secretName: postgres-credentials
  database: poc_api
  username: poc_api
  password: poc_api_password
  seedRows: 50
  service:
    name: postgres
    port: 5432
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  service:
    name: redis
    port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
